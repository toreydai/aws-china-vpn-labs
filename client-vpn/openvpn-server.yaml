AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy OpenVPN server on AWS China Region (cn-northwest-1)

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type
  SshCidr:
    Type: String
    Description: Source CIDR allowed for SSH (port 22), e.g. <your-public-ip>/32 — no default, must be set explicitly to avoid opening SSH to the internet
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
  VpnCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: Source CIDR allowed for VPN (UDP 1194)
  VpnUsername:
    Type: String
    Default: vpnuser
    Description: VPN login username
  VpnPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: VPN login password (min 8 characters)

Resources:

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: OpenVPN Server
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 1194
          ToPort: 1194
          CidrIp: !Ref VpnCidr
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr

  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com.cn
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws-cn:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref Role]

  Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M
    Metadata:
      AWS::CloudFormation::Init:
        config:
          files:
            /etc/openvpn/server/server.conf:
              content: |
                port 1194
                proto udp
                dev tun
                ca ca.crt
                cert issued/server1.crt
                key private/server1.key
                dh none
                ecdh-curve prime256v1
                topology subnet
                server 10.8.0.0 255.255.255.0
                ifconfig-pool-persist ipp.txt
                max-clients 50
                push "route 192.168.1.0 255.255.255.0"
                push "route 192.168.2.0 255.255.255.0"
                keepalive 10 120
                data-ciphers AES-256-GCM:AES-128-GCM
                data-ciphers-fallback AES-256-GCM
                tls-version-min 1.2
                tls-cipher TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384
                tls-crypt ta.key
                compress stub-v2
                persist-key
                persist-tun
                status /var/log/openvpn-status.log
                log-append /var/log/openvpn.log
                verb 3
                explicit-exit-notify 1
                user nobody
                group nobody
                auth-user-pass-verify /etc/openvpn/checkpsw.sh via-env
                verify-client-cert none
                username-as-common-name
                script-security 3

            /etc/openvpn/checkpsw.sh:
              mode: '000755'
              content: |
                #!/bin/bash
                set -euo pipefail
                PASSFILE="${OPENVPN_PASSWORD_FILE:-/etc/openvpn/psw-file}"
                LOG_FILE="${OPENVPN_PASSWORD_LOG:-/etc/openvpn/openvpn-password.log}"
                TIME_STAMP=$(date "+%Y-%m-%d %T")
                log() { echo "${TIME_STAMP}: $*" >> "${LOG_FILE}"; }
                if [ ! -r "${PASSFILE}" ]; then
                  log "Cannot open password file: ${PASSFILE}"; exit 1
                fi
                if [ -z "${username:-}" ] || [ -z "${password:-}" ]; then
                  log "Missing username or password from OpenVPN env"; exit 1
                fi
                CORRECT=$(awk -v u="${username}" '!/^[;#]/ && $1==u {print $2; exit}' "${PASSFILE}")
                if [ -z "${CORRECT}" ]; then
                  log "User not found: ${username}"; exit 1
                fi
                if [ "${password}" = "${CORRECT}" ]; then
                  log "Auth OK: ${username}"; exit 0
                fi
                log "Wrong password: ${username}"; exit 1

            /etc/openvpn/psw-file:
              mode: '000640'
              owner: root
              group: nobody
              content: !Sub |
                ${VpnUsername} ${VpnPassword}

            /etc/openvpn/openvpn-password.log:
              mode: '000666'
              content: ''

    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref SecurityGroup]
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-openvpn'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -xe

          # Install cfn-bootstrap and iptables from default AL2023 repo (AWS China internal endpoint)
          dnf install -y aws-cfn-bootstrap iptables

          # openvpn / easy-rsa are in EPEL; use Tsinghua mirror to avoid slow Fedora upstream
          cat > /etc/yum.repos.d/epel-china.repo << 'REPOEOF'
          [epel]
          name=EPEL 9 - Tsinghua Mirror
          baseurl=https://mirrors.tuna.tsinghua.edu.cn/epel/9/Everything/$basearch/
          enabled=1
          gpgcheck=0
          REPOEOF
          dnf install -y openvpn easy-rsa

          # Write config files via cfn-init
          /opt/aws/bin/cfn-init -v \
            --stack ${AWS::StackName} \
            --resource Instance \
            --region ${AWS::Region} \
            || { /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}; exit 1; }

          # PKI: init and build CA + server cert
          # easy-rsa 3.x (EPEL 9) 不提供 make-cadir，手动复制
          mkdir -p /etc/openvpn/easy-rsa
          cp -r /usr/share/easy-rsa/3/. /etc/openvpn/easy-rsa/ 2>/dev/null || \
            cp -r /usr/share/easy-rsa/. /etc/openvpn/easy-rsa/
          cd /etc/openvpn/easy-rsa
          ./easyrsa init-pki
          ./easyrsa --batch build-ca nopass
          ./easyrsa --batch build-server-full server1 nopass

          # Copy PKI files into server dir (server.conf uses relative paths)
          mkdir -p /etc/openvpn/server/issued /etc/openvpn/server/private
          cp pki/ca.crt           /etc/openvpn/server/
          cp pki/issued/server1.crt  /etc/openvpn/server/issued/
          cp pki/private/server1.key /etc/openvpn/server/private/
          chmod 600 /etc/openvpn/server/private/server1.key

          # Generate TLS auth key
          openvpn --genkey secret /etc/openvpn/server/ta.key
          chmod 600 /etc/openvpn/server/ta.key

          # IP forwarding
          echo 'net.ipv4.ip_forward=1' > /etc/sysctl.d/99-openvpn.conf
          sysctl -p /etc/sysctl.d/99-openvpn.conf

          # iptables NAT (persist via rc.local)
          NIC=$(ip route | awk '/default/{print $5; exit}')
          iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o ${!NIC} -j MASQUERADE
          echo "iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o ${!NIC} -j MASQUERADE" \
            >> /etc/rc.d/rc.local
          chmod +x /etc/rc.d/rc.local

          # Start OpenVPN
          systemctl enable --now openvpn-server@server

          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --resource Instance \
            --region ${AWS::Region}

  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref Instance

Outputs:
  ServerIP:
    Value: !Ref EIP
    Description: OpenVPN server public IP (EIP)

  SshCommand:
    Value: !Sub 'ssh -i <key.pem> ec2-user@${EIP}'
    Description: SSH access to server

  DownloadClientFiles:
    Description: Download ca.crt and ta.key from server for client configuration
    Value: !Sub |
      scp -i <key.pem> ec2-user@${EIP}:/etc/openvpn/server/ca.crt .
      scp -i <key.pem> ec2-user@${EIP}:/etc/openvpn/server/ta.key .

  UpdateClientConfig:
    Description: Update client1.ovpn remote directive with server IP
    Value: !Sub 'sed -i "s/remote vpn.example.com 1194/remote ${EIP} 1194/" client1.ovpn'

  CheckServiceStatus:
    Description: Check OpenVPN service status on server
    Value: 'sudo systemctl status openvpn-server@server && sudo tail -50 /var/log/openvpn.log'
